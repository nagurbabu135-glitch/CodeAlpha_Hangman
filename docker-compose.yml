version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: hangman-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: hangman
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: hangman-backend
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/hangman
      JWT_SECRET: your_jwt_secret_key_change_this
      OPENAI_API_KEY: your_openai_api_key_here
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

volumes:
  mongodb_data:
